version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task_manager_db
    environment:
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager_password
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Opcional: Adminer para gerenciar banco visualmente
  adminer:
    image: adminer:latest
    container_name: task_manager_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

# Para rodar: docker-compose up -d
# Para parar: docker-compose down
# Para resetar: docker-compose down -v
